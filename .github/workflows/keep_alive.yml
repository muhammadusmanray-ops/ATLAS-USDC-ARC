name: Keep Atlas Alive

on:
  schedule:
    # Run every 45 minutes
    - cron: '*/45 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          curl -I https://hewjdewjdbqwjdwej-atlasusdc.hf.space/api/health
          echo "✅ Ping sent to Atlas Arc Dashboard at $(date)"
